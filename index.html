<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20 Te Buscar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #111827;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      color: #cbd5e1;
      margin-top: 10px;
    }

    .container {
      padding: 40px 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }

    .info {
      margin-top: 30px;
      font-size: 14px;
      color: #94a3b8;
    }

    .form {
      max-width: 360px;
      margin: 0 auto;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #64748b;
    }

    .btn {
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<header>
  <img src="logo.png" alt="20 Te Buscar" class="logo">
  <h1>20 Te Buscar</h1>
  <p>Mobilidade rápida, segura e acessível</p>
</header>
<div class="container">
  <h2>Pedir Mototáxi</h2>
  <p>Preenche os dados e envia o pedido directo no WhatsApp</p>

  <div class="form">
    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Ex: Tomocene Frio">

    <label for="origem">Localização</label>
    <input type="text" id="origem" placeholder="Ex: Bairro Macuti, perto da farmácia">

    <label for="destino">Destino</label>
    <input type="text" id="destino" placeholder="Ex: Praça do Município">

    <!-- TROCA O NÚMERO ABAIXO PELO TEU -->
    <a class="btn" id="botaoPedir" href="#" target="_blank" style="display:block; text-align:center; margin-top:24px;">
      🚀 Pedir Corrida no WhatsApp
    </a>
  </div>

  <div class="info">
    Enviaremos um mototaxista até ti em poucos minutos.<br>
    Confirma os detalhes no WhatsApp.
  </div>
</div>

<footer style="padding: 20px; font-size: 12px; color: #64748b;">
  Criado por Tomocene Fernando Frio
</footer>

<script>
  const numero = "258835285053";
  const botao = document.getElementById("botaoPedir");

  function actualizarLink() {
    const nome = document.getElementById("nome").value.trim();
    const origem = document.getElementById("origem").value.trim();
    const destino = document.getElementById("destino").value.trim();

    let mensagem = "Olá! Quero pedir uma corrida de mototáxi.";
    if (nome) mensagem += `\nNome: ${nome}`;
    if (origem) mensagem += `\nLocal: ${origem}`;
    if (destino) mensagem += `\nDestino: ${destino}`;

    botao.href = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  }

  document.getElementById("nome").addEventListener("input", actualizarLink);
  document.getElementById("origem").addEventListener("input", actualizarLink);
  document.getElementById("destino").addEventListener("input", actualizarLink);
  actualizarLink();
</script>
</body>
</html>
